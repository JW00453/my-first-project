<!DOCTYPE html>

<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#121212">
    <link rel="stylesheet" href="CSS/corefour.css">
    <title>The Core Four - Compatibility Checker</title>
    <meta charset="utf-8">
    <meta name="description"
        content="Use The Core Four Compatibility Checker to ensure your PC components work together seamlessly. Get expert hardware advice for your next custom computer build.">
</head>

<body>
    <div id="wrapper">
        <header>
            <h1><a href="index.html">The Core Four</a></h1>
        </header>

        <nav>
            <a href="bundles.html">Shop Bundles</a> &nbsp;
            <a href="compcheck.html">Compatibility Checker</a> &nbsp;
            <a href="about.html">About</a> &nbsp;
            <a href="#" class="snipcart-checkout">Shopping Cart</a>
        </nav>

        <main>
            <section id="checker-tool">
                <h2>Compatibility Checker</h2>

                <form id="comp-form" class="checker-form" onsubmit="return validateComp()">
                    <label for="cpu-select">Select CPU:</label>
                    <select id="cpu-select">
                        <option value="">- Choose a CPU -</option>
                        <option value="amd1">AMD Ryzen 9 9950X3D</option>
                        <option value="intel1">Intel Core Ultra 7 270K</option>
                        <option value="intel2">Intel Core Ultra 9 285K</option>
                    </select>

                    <label for="mobo-select">Select Motherboard:</label>
                    <select id="mobo-select">
                        <option value="">- Choose a Motherboard -</option>
                        <option value="strix">ROG Strix X870-F Gaming WiFi</option>
                        <option value="hero">ROG Maximus Z890 Hero</option>
                    </select>

                    <label for="ram-select">Select RAM:</label>
                    <select id="ram-select">
                        <option value="">- Choose RAM -</option>
                        <option value="6000">64GB G.Skill 6000MHz</option>
                        <option value="7200">64GB G.Skill 7200MHz</option>
                        <option value="8400">48GB G.Skill 8400MHz</option>
                    </select>

                    <label for="cooler-select">Select CPU Cooler:</label>
                    <select id="cooler-select">
                        <option value="">- Choose a Cooler -</option>
                        <option value="nhd15">Noctua NH-D15</option>
                        <option value="ml360">CoolerMaster MasterLiquid 360</option>
                        <option value="pl360">CoolerMaster MasterLiquid PL360 Flux</option>
                    </select>

                    <input type="submit" value="Check Compatibility">
                </form>
            </section>

            <form method="post" action="https://webdevbasics.net/scripts/demo.php" class="checker-form"
                onsubmit="return validateForm()">
                <h3>Have a question about a bundle? Ask us!</h3>

                <label for="full-name">Full Name:</label>
                <input type="text" id="full-name" name="Name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="Email" required>

                <label for="bundle-choice">Which Bundle are you asking about?</label>
                <input type="text" id="bundle-choice" name="Bundle-Choice" placeholder="e.g., Bundle 1">

                <label for="message">Hardware Questions:</label>
                <textarea id="message" name="Message" rows="1"></textarea>

                <input type="submit" value="Submit Check">
            </form>
        </main>
    </div>
    <footer>
        <a href="index.html">Home</a> &nbsp;
        <a href="bundles.html">Shop Bundles</a> &nbsp;
        <a href="compcheck.html">Compatibility Checker</a> &nbsp;
        <a href="about.html">About</a> &nbsp;
        <a href="#" class="snipcart-checkout">Shopping Cart</a> &nbsp;
        <br>&copy;2026 The Core Four
    </footer>
</body>

<script>
    function validateComp() {
        var c = document.getElementById('cpu-select').value;
        var m = document.getElementById('mobo-select').value;
        var r = document.getElementById('ram-select').value;
        var co = document.getElementById('cooler-select').value;

        if (c == "" || m == "" || r == "" || co == "") {
            alert("Please select all four components to check compatibility.");
            return false;
        }

        runHardwareCheck(c, m, r, co);
    }

    function runHardwareCheck(cpu, mobo, ram, cooler) {
        var alertMessage = "";

        if (cpu == "amd1" && mobo == "strix" && ram == "6000" && cooler == "nhd15") {
            alertMessage = "SYSTEM COMPATIBLE!\n\nMatches Bundle 1";
        } else if (cpu == "intel1" && mobo == "strix" && ram == "7200" && cooler == "ml360") {
            alertMessage = "SYSTEM COMPATIBLE!\n\nMatches Bundle 2";
        } else if (cpu == "intel2" && mobo == "hero" && ram == "8400" && cooler == "pl360") {
            alertMessage = "SYSTEM COMPATIBLE!\n\nMatches Bundle 3";
        } else {
            alertMessage = "COMPATIBILITY WARNING\n\nThese parts are not a verified match.";
        }

        alert(alertMessage);
    }
</script>

<script>
    function validateForm() {

        if (document.forms[0]["Bundle-Choice"].value == "") {
            alert("Please tell us which bundle you are asking about.");
            return false;
        }

        if (document.forms[0].Message.value == "") {
            alert("Please enter your hardware questions.");
            return false;
        }

        alert("Form valid! Your compatibility check is being submitted.");
        return true;
    }
</script>

</html>
